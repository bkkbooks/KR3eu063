服腹中耎即當散也心下堅大如盤邊如旋杯水飲所作為則按當有小便不利證排膿散枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服為則按有瘡癰而胸腹拘滿者主之桂枝枳實生薑湯桂枝生薑各三兩枳實五枚上三味以水六升煮取三升分溫三服心中痞諸逆心懸痛為則按當有嘔證又曰痞下脫滿字耶枳實薤白桂枝湯枳實四枚厚朴四兩薤白半升桂枝一兩栝蔞實一枚上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之橘皮枳實生薑湯橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之為則按當有嘔證茯苓飲茯苓人參術各三兩枳實二兩橘皮二兩半生薑四兩上六味水六升煮取一升八合分溫三服如人行八九里進之治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食為則按當有心下痞硬證橘皮竹茹湯橘皮二斤一本作二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服噦逆者橘皮湯橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈乾嘔噦若手足厥者桂枝茯苓丸桂枝茯苓牡丹桃仁芍藥各等分上五味末之煉蜜和丸如免屎大每日食前服一丸不知加至三丸婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者為症痼害妊娠六月動者前三月經水利時胎下血者後斷三月不血也所以血不止者其症不去故也當下其症為則按當有沖逆心下悸證又曰是不唯治婦人之病方也芎歸膠艾湯芎藭阿膠各二兩甘草二兩艾葉當歸各三兩芍藥四兩乾地黃六兩上七味以水五升清酒五升合煮取三升去滓內膠令消盡溫服一升日三服不差更作婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞疽為則曰凡治吐血下血諸血證者不別男子婦人矣旋覆花代赭石湯旋覆花三兩人參二兩生薑五兩半夏半升代赭一兩大棗三兩甘草三兩上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒發汗若吐若下解後心下痞硬噫氣不除者赤石脂禹餘糧湯赤石脂一斤禹餘糧一斤已上二味以水六升煮取二升去滓三服傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便為則按此章非疾病醫義故不取雖然赤石脂禹餘糧湯證可從於此也又云當利其小便下方脫桃花湯赤石脂一斤乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫七合內赤石脂未方寸匕日三服若一服愈余勿服少陰病下利便膿血者少陰病二三日至四五日腹痛小便不利下利不止便膿血者下利便膿血者大豬膽汁大豬膽一枚膽汁和醋少許以灌穀道中如一食頃當大便出陽陽病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導蜜煎導蜜七合一味內銅器中微火煎之稍凝似飴狀擾之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之主治見大豬膽汁下酸棗仁湯酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭二兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服虛勞虛煩不得眠為則曰虛勞當作煩躁葶藶大棗瀉肺湯葶藶搗丸如彈丸大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服肺癰喘不得臥肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞支飲不得息麻子仁丸麻子仁二升芍藥半斤枳實一斤大黃一斤厚朴一尺杏仁一斤上六味末之煉蜜和丸梧子大飲服十丸日三以知為度趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約己椒藶黃丸防己椒目葶藶大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩腹滿口舌乾燥此腸間有水氣蜀漆散蜀漆雲母龍骨各等分上三味杵為散未發前以漿水服半錢瘧多寒者名曰牡瘧為則按當有臍下動證十棗湯芫花甘遂大戟各等分已上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也病懸飲者咳家其脈弦為有水夫有支飲家咳煩胸中痛者不卒死至一百日一歲桔梗白散桔梗貝母各三分巴豆一分上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一杯則定咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿寒如米粥者為肺癰病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服為則按有結毒而濁唾吐膿者主之走馬湯巴豆二枚杏仁二枚上二味以綿纏槌令碎熱湯二合捻取白汁飲之當下老少量之通治飛尸鬼擊病中惡心痛腹脹大便不通備急圓大黃一兩乾薑一兩巴豆一兩上藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之莫令泄氣主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口禁停尸卒死者以暖水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口禁亦須折齒灌之礬石湯礬石二兩上一味以漿水一斗五升煎三五沸浸腳良治腳氣衝心消礬散硝石礬石等分上二味為末以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疽其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治礬石丸礬石三分杏仁一分上二味末之煉蜜和丸棗核大內藏中劇者再內之婦人經水閉不利藏堅癖不止中有乾血下白物蛇床子散蛇床子仁上一味末之以白粉少許和令相得如棗大綿裹內之自然溫溫陰中坐藥不試方十八方竹葉石膏湯竹葉二把石膏一斤半夏半升人參三兩甘草二兩粳米半升麥門冬一升上七味以水一斗煮取六升去滓內粳來煮米熟湯成去米溫服一升日三服傷寒解後虛羸少氣氣逆欲吐者為則按當有枯燥證又按條辨作竹葉三兩今從之麥門冬湯麥門冬七升半夏一升人參二兩甘草二兩粳米三合大棗十枚上六味以水一斗二升煮取六升溫服一升日三夜一服大逆上氣咽喉不利止逆下氣者為則按當有心下痞證雄黃熏雄黃上一味為末筒瓦二枚合之燒向肛熏之蝕於肛者頭風摩散大附子一枚鹽等分上二味為散浗了以方寸匕已摩疾上令藥力行皂莢丸皂莢八兩上一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服咳逆上氣時時唾濁但坐不得眠葦莖湯葦莖二升薏苡仁半升桃仁五十枚瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿咳有微熱煩滿胸中甲錯是為肺癰當歸生薑羊肉湯當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩術一兩加生薑者亦加水五升煮取三升二合服之寒疝腹中痛及脅痛裡急者産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足蒲灰散蒲灰七分滑石二分上二味杵為散飲服方寸匕日三服小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之厥而皮水者滑石白魚散滑石二分亂髮二分燒白魚二分上三味杵為散飲服方寸匕日三服小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之豬膏發煎豬膏半斤亂髮如雞子大三枚上二味和膏中煎之發消藥成分再服病從小便出主諸黃柏葉湯柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服吐血不止者黃土湯甘草乾地黃朮附子阿膠黃芩各三兩灶中黃土半斤上七味以水八升煮取三升分溫二服下血先便後血此遠血也主吐血衄血雞屎白散雞屎白上一味為散取方寸匕以水六合和溫服轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者蜘蛛散蜘蛛十四枚桂枝半兩上二味為散取八分一匕飲和服日再服蜜丸亦可陰狐疝氣者偏有小大時時上下當歸芍藥散當歸三兩芍藥一斤茯苓四兩術四兩澤瀉半斤芎藭半斤一作三兩上六味杵為散取方寸匕酒和日三服婦人懷妊腹中㽲痛歸母苦參丸當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸妊娠小便難飲食如故狼牙湯狼牙三兩上一味以水四升煮取半升以綿纏筋如繭浸湯瀝陰中日四遍少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之小兒疳蟲蝕齒方雄黃葶藶上二味末之取臘日豬脂熔以槐枝綿裹頭四五枚點藥烙之跋醫之為學也其方而已方能載其道以傳之千載故其欲求之也不由其路譬如場師失養梧檟於枳棘苟其失養之也且人賤之況又迷罔之人不亦悲乎我東洞先生取道于越人求方於長沙以唱古醫之術然其書之篇章證或先方而發焉方或後證而起焉不易卒睹於是先生乃因對之次之名曰類聚方嗟乎善乎此書乃使志古醫之術者得由其路也不迷罔焉夫道如大路然孟軻氏之云今乎宜也詩曰不愆不忘率由舊章抑此之謂與寶曆壬午春二月門人東都山常卿謹跋題類聚方後古也者邈矣無有方書存焉其存焉者僅金匱玉函傷寒論已此猶天之未喪斯文也是以歷代為方者必尊奉張仲景氏矣雖然尋案多滯不得其蘊奧柔則茹之剛則吐之終令斯文至拂地焉且其書歷世之久闕文錯簡不可勝計加之以傳者增損之變不亦悲乎獨吾東洞先生張膽瞋日朝考夕試剛亦不吐柔亦不茹嬰類而長之依例而刪之以著類聚方舉以視門人令人人得與斯文可謂幸甚矣蓋類聚所以審方意也方意審則藥能從藥能從則疾疢無所潛慝也賢臣子不嘗則已嘗則苦於口利於疾也百世一日而後醫之從事於仲景氏日益深乎則斯文鬱郁乎今者豈有與仲景氏之世異乎哉余不勝其雀躍遂題類聚方後門人阿波新崎國林謹題
