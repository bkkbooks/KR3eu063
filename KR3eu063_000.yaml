body:
  text: 凡例始我先生之編類聚方也軌在左右躬受其凡例此書之就成也軌之所録其凡之例亦已備矣乃不敢私之敢措諸卷首以布諸同志之士乃我先生之編類聚方也凡例如下一昔者張氏之書其散軼也久矣晉大醫令王氏叔和集為之次至今學者受其賜矣雖然叔和其識之未優也加以私言碔夫燕石俄然收之而後之讀之亦不知擇焉見以為一圭一璧此盡希世之寶也嗚呼可悲夫乃今悉取其空言虛語也臆說理義也痛極刪削然後譬之崑崙玄圃無非圭璧者此所以為仲景雪冤而為學者發贋也一仲景之書蓋一而已岐為二三別病頒方抑亦後人之撰乎夫醫之處方也隨證以移惟其於同也萬病一方惟其於變也一毒萬方故雞壅豕零時為帝也堇及桔梗互為宰也奇乎正乎縱橫取捨醫師之術也此書本不別病也不頒方也亦其志之所存乎一蓋方之所貴也不在古今期於治疾論之所貴也不在新故期於有事故方能治疾也不問古今論若繫於事也不在新故惟是所以汲汲於治疾也一諸方以類就位又以類之變猶八卦之旋為六十有四乎其慎斯術也以往其方之用與藥之能可得而言矣一原文有舉脈之例而措病之證焉有稱病之名而略形之狀焉凡今學者宜以此推彼矣一諸方或無其證也證或無其方也則據傍例攟托之加諸為則之按焉者以異於其舊蓋皆不苟用私說也於藥徵乎見之一仲景之書方之與證其所載也散在諸篇如睹其證之全也固非急索焉而所能得矣今之於薈萃也無有孑遺矣一諸方而在於諸論之中無一不載焉其空言虛語臆說理義既已非夫疾醫之事則域焉而異之所以燭乎昧行之徒也亦惡其辭而域焉終沒其證也是故有域焉而刪焉者有域焉而指擲焉者凡其學者其能詳之矣一凡其不試者十有八方也附之於後以俟後世之君子不敢空斷矣又不敢撰次矣門人藝陽藤利軌謹記正文桂枝湯桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者太陽病頭痛發熱汗出惡風者太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也太陽病外證未解脈浮弱者當以汗解太陽病外證未解者不可下也下之為逆欲解外者太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄傷寒發汗解半日許復煩脈浮數者可更發汗傷寒醫下之績得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表桂枝湯太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表解表乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯陽明病脈遲汗出多微惡寒者表未解也可發汗病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯太陰病脈浮者可發汗下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯吐利止而身痛不休者當消息和解其外宜桂枝湯少和之下利後身疼痛清便自調者急當救表宜桂枝湯發汗婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之産後中風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳服桂枝湯大汗出脈洪大者與桂枝湯加前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯桂枝加桂湯於桂枝湯方內加桂二兩燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯桂枝加芍藥湯於桂枝湯方內加芍藥三兩本太陽病醫反下之因爾腹滿時痛者屬太陰也為則按腹滿時痛者即拘急而痛也是以芍藥為主爾桂枝去芍藥湯於桂枝湯方內去芍藥太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之為則按不拘急故去芍藥也桂枝加葛根湯於桂枝湯方內加葛根四兩太陽病項背強𠘧𠘧反汗出惡風者栝蔞桂枝湯於桂枝湯方內加栝蔞根二兩太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙為則按桂枝湯之症而渴者主之桂枝加黃蓍湯於桂枝湯方內加黃蓍二兩黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗諸病黃家但利其小便假令脈浮當以汗解之為則按黃蓍主治皮膚水氣可考藥徵桂枝加芍藥大黃湯於桂枝加芍藥方內加大黃一兩本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃主之為則按桂枝加大黃湯因桂枝加芍藥湯加大黃者也故方名從之桂枝加厚朴杏子湯於桂枝湯方內加厚朴二兩杏子五十個喘家作桂枝湯加厚朴杏子佳太陽病下之微喘者表未解故也為則按當有胸滿證烏頭桂枝湯烏頭五枚上一味以蜜二斤煎減半去滓以桂枝湯五合解之得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當用此方為則按是烏頭煎而合桂枝湯方也當列烏頭煎方下今列之桂枝加附子湯者示其異也又按煎法可依大烏頭煎之法桂枝加附子湯於桂枝湯方內加附子一枚太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝去芍藥加附子湯於桂枝去芍藥湯方內加附子一枚太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之桂枝附子湯桂枝四兩附子三枚生薑三兩甘草二兩大棗十二枚上五味以水六升煮取二升去滓分溫三服傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加朮湯主之為則按當有上衝證此方與桂枝去芍藥加附子湯同而治與方名異彼方下曰微惡寒此方下曰身體疼煩惡寒輕疼煩重獨在附子之多少也已桂枝附子去桂加朮湯於桂枝附子湯方內去桂加朮四兩上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便硬小便自利者為則按桂枝附子湯證而無沖逆者也桂枝去桂加苓朮湯於桂枝湯方內去桂加苓朮各三兩服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者為則按當有心下悸之證桂薑棗草黃辛附湯桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃細辛各二兩附子一枚上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈氣分心下堅大如盤邊如旋杯水飲所作為則按證不備也此方合桂枝去芍藥湯與麻黃附子細辛湯也證當於二方之下求也藥徵有辨桂枝去芍藥加皂莢湯於桂枝湯方內去芍藥加皂莢二枚肺痿吐涎沫者桂枝加龍骨牡蠣湯於桂枝湯方內加龍骨牡蠣各三兩夫失精家小腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交為則按當有胸腹動證桂枝去芍藥加蜀漆龍骨牡蠣湯桂枝三兩甘草二兩生薑三兩牡蠣五兩大棗十二枚蜀漆三兩龍骨四兩上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升傷寒脈浮醫以火迫卻之亡陽必驚狂起臥不安者火邪也為則按當有胸腹動而沖逆之證桂枝加芍藥生薑人參湯於桂枝湯方內加芍藥生薑各一兩人參三兩發汗後身疼痛脈沉遲者為則按當有心下痞硬或拘急或嘔證桂枝二麻黃一湯桂枝一兩十七銖芍藥一兩六銖麻黃十六銖生薑一兩六銖杏仁十六個甘草一兩二銖大棗五枚上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解桂枝二越婢一湯桂枝芍藥甘草各十八銖生薑一兩三銖大棗四枚麻黃十八銖石膏二十四銖上七味㕮咀以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗桂枝麻黃各半湯桂枝一兩十六銖芍藥生薑甘草麻黃各一兩大棗四枚杏仁二十四個上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得少汗出身必癢小建中湯桂枝三兩甘草三兩大棗十二枚芍藥六兩生薑三兩膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之傷寒二三日心中悸而煩者虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥男子黃小便自利婦人腹中痛為則按當有腹中拘急之證其方類芍藥甘草湯也黃蓍建中湯於小建中湯方內加黃蓍一兩半虛勞裡急諸不足為則按當有盜汗黃汗之證又曰桂枝加芍藥湯當入於此而以有桂枝之名列於彼也黃蓍桂枝五物湯黃蓍三兩芍藥三兩桂枝三兩生薑六兩大棗十二枚上五味以水六升煮取二升溫服七合日三服血痹病從何得之師曰夫尊榮人骨弱肌膚盛重困疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀為則按桂枝加黃蓍湯證而嘔無急迫者黃蓍桂枝苦酒湯黃蓍五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如藥汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之桂枝