渴者中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不不者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之男子消渴小便反多以飲一斗小便一斗腎氣丸主之脈浮小便不利微熱消渴者宜利小便發汗假令瘦人臍下有悸吐涎沫而癲眩此水也本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者茵陳五苓散茵陳蒿末十分五苓散五分上二物和先食飲方寸匕日三服黃疸病為則按當有小便不利或渴證豬苓湯豬苓茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服若脈浮發熱渴欲飲水小便不利者陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也少陰病下利六七日咳而嘔渴心煩不得眠者為則按當有便膿血證豬苓散豬苓茯苓術各等分上三味杵為散飲服方寸匕日三服嘔吐而病在膈上後思水者解急與之思水者牡蠣澤瀉散牡蠣澤瀉栝蔞根蜀漆葶藶商陸根海藻各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三服大病差後從腰已下有水氣者為則按當有胸腹有動或渴證八味丸乾地黃八兩山茱萸薯蕷各四兩澤瀉三兩茯苓三兩牡丹皮三兩桂枝附子各一兩上八味末之煉蜜和丸梧子大酒下十五丸日再服腳氣上入小腹不仁虛勞腰痛少腹拘急小便不利者夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之男子消渴小便反多以飲一斗小便一斗腎氣丸主之脈浮小便不利微熱消渴者宜利小便發汗五苓散主之婦人病飲食如故煩熱不得臥而反倚息者何也曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈為則按外臺祕要作桂枝二兩附子二兩今從之栝蔞瞿麥丸栝蔞根二兩茯苓薯蕷各三兩附子一枚瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知小便不利者有水氣其人若渴為則按當有心下悸證麻黃湯麻黃三兩桂枝二兩甘草一兩杏仁七十個上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不順啜粥余如桂枝法將息太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者太陽與陽明合病喘而胸滿者不可下太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄乃解所以然者陽氣重故也脈浮者病在表可發汗脈浮而數者可發汗傷寒脈浮緊不發汗因致衄者陽明中風脈弦浮大而短氣腹都滿脅下及心痛又按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治陽明病脈浮無汗而喘者發汗則愈麻黃加朮湯於麻黃湯方內加朮四兩濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之麻黃甘草湯甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒里水越婢加朮湯主之甘草麻黃湯亦主之為則按水病而腫脹或喘或自汗出或無汗者主之麻黃附子甘草湯麻黃二兩甘草二兩附子一枚上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子甘草湯浮者宜杏子湯為則按當有惡寒證麻黃附子細辛湯麻黃二兩細辛二兩附子一枚上三味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升日三服少陰病始得之及發熱脈沉者為則按不可無惡寒之證麻黃杏仁甘草石膏湯麻黃四兩杏仁五十個甘草二兩石膏半斤上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升發汗後不可更行桂枝湯汗出而喘無大熱者金匱發汗後作下後為則按當有煩渴證麻黃杏仁薏苡甘草湯麻黃半兩甘草一兩薏苡仁半兩杏仁十個上銼麻豆大每服四錢匕水半盞煮八分去滓溫服有微汗避風病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久取冷所致也為則按當有喘滿證外臺古今録驗作薏苡半斤麻黃四兩甘草杏仁各二兩上四味以水五升煮取二升分溫再服汗出即愈今從之牡蠣湯牡蠣四兩麻黃四兩甘草二兩蜀漆三兩上四味以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服治牡瘧為則按麻黃甘草湯證而胸腹有動者主之麻黃醇酒湯麻黃三兩上一味以美清酒五升煮取二升半頓服盡冬月用酒春月用水煮之治黃疸為則按當有喘證半夏麻黃丸半夏麻黃各等分上二味末之煉蜜和丸小豆大飲服三丸日三心下悸者為則按當有喘或嘔證小青龍湯麻黃三兩芍藥三兩五味子半升乾薑三兩甘草三兩桂枝三兩半夏半升細辛三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升加減法若微利者去麻黃加蕘花如雞子若渴者去半夏加栝蔞根三兩若噎者去麻黃加附子一枚若小便不利少腹滿去麻黃加茯苓四兩若喘者去麻黃加杏仁半升傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或喘者傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也病溢飲者當發其汗大青龍湯主之小青龍湯亦主之咳逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味甘草湯治其氣衝婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之大青龍湯麻黃六兩桂枝二兩甘草二兩杏仁四十個生薑三兩大棗十二枚石膏雞子大上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也太陽中風脈緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之後條辨續論皆云當是小青龍湯證今從之病溢飲者當發其汗大青龍湯主之小青龍湯亦主之為則按當有渴證蓋厥逆以下真武湯之證也可考文蛤湯文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十個大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛為則按當有喘證越婢湯麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服風水惡風一身悉腫脈浮不渴續自汗出無大熱為則按大青龍湯證而無咳嗽沖逆有腳攣痛之證者主之不渴當作渴自汗出之下當有或無汗字越婢加朮湯于越婢湯方內加朮四兩里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也里水越婢加朮湯主之甘草麻黃湯亦主之治內極熱則身體津脫腠理開汗大泄厲風氣下焦卻弱越婢加半夏湯于越婢湯方內加半夏半升咳而上氣此為肺脹其人喘目如脫狀脈浮大者為則按當有煩渴嘔逆證葛根湯葛根四兩麻黃三兩桂枝二兩芍藥二兩甘草二兩生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌太陽病項背強𠘧𠘧無汗惡風太陽與陽明合病者必自下利太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙為則按合病並病說非疾醫事也葛根加半夏湯於葛根湯方內加半夏半升太陽與陽明合病不下利但嘔者葛根黃連黃芩湯葛根半斤甘草二兩黃芩二兩黃連三兩上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病桂枝證醫反下之利遂不止服促者表未解也喘而汗出者為則按當有項背強急心悸證小柴胡湯柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服後加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩傷寒六七日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者麻黃湯主之血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也服柴胡湯已渴者屬陽明也以法治之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡下之則愈傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復其外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得尿而解傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯陽明病發潮熱大便溏小便自可胸脅滿不去者陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明中風脈弦浮大而短氣腹部滿脅下及心痛又按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者若已吐下發汗溫針讝語柴胡證罷此為壞病知犯何逆以法治之嘔而發熱者傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之諸黃腹痛而嘔者新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也曰新産血虛多汗出喜中風故今病痙亡血復汗寒多故今鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者三物黃芩湯主之柴胡加芒硝湯於小柴胡湯方內加芒硝六兩傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之為則按小柴胡湯證而有堅塊者主之柴胡去半夏加栝蔞湯於小柴胡湯方內去半夏加栝蔞根四兩治瘧病發渴者亦治勞瘧為則按當有胸脅苦滿證柴胡加桂枝湯桂枝黃芩人參各一兩甘草一兩半夏二合半芍藥一兩半大棗六枚生薑一兩半柴胡四兩上九味以水七升煮取三升去滓溫服一升日三服傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者發汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈心腹卒中痛者柴胡薑桂湯柴胡半斤桂枝三兩乾薑三兩栝蔞根四兩黃芩三兩牡蠣三兩甘草二兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也瘧寒多微有熱或但寒不熱者為則按頭汗出者是沖逆也又曰當有胸脅有動證柴胡加龍骨牡蠣湯半夏二合大棗六枚柴胡四兩生薑人參龍骨鉛丹桂枝茯苓各一兩半大黃二兩牡蠣一兩半上十一味以水八升煮取四升內大黃切如棋子更煮一二沸去滓溫服一升傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者為則按當有胸腹有動證玉函經無切如棋子四字一二沸作取二升今從之大柴胡湯柴胡半斤黃芩三兩芍藥三兩半夏半升生薑五兩枳實四枚大棗十二枚上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也太陽病過經十餘日及二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不上心下急鬱郁微煩者為未解也與大柴胡湯下之則愈傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒發熱汗出不解心下痞硬嘔吐而下利者按之心下滿痛者此為實也當下之傷寒後脈沉沉者內實也下解之為則按小柴胡湯證而胸腹拘攣可下者主之又按本方當有大黃玉函經再煎下有取三升三字又曰一方已下注文也白虎湯知母六兩石膏一斤甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈浮滑此表有熱里有寒三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗出者傷寒脈滑而厥者里有熱也為則按以上三條非白虎湯證乃於白虎加人參湯條下辨之又曰煎法可從白虎加桂枝湯白虎加人參湯於白虎湯方內加人參三兩服桂枝湯大汗出後大煩渴不解脈洪大者傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者傷寒無大熱口燥渴心煩背微惡寒者傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者右渴欲飲水口乾舌燥者為則按已上四章千金方作白虎湯主之外臺亦同而方後曰傷寒論方今從之太陽中熱者暍是也汗出惡寒身熱而渴為則按此方白虎湯證而心下痞硬者主之白虎加桂枝湯於白虎湯方內加桂枝三兩上以水一斗五升煮取八升去滓溫服溫瘧者其脈如平身無寒但熱骨節疼煩時嘔為則按當有煩渴沖逆證小承氣湯大黃四兩厚朴二兩枳實三枚已上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若大便不通者可與小承氣湯微和胃氣勿令大泄下傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯陽明病潮熱大便微硬者可與大承湯湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語小承氣湯主之若一服讝語止更莫復服陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少小與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯下利讝語者有燥屎也大便不通噦數讝語者厚朴三物湯厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度痛而閉者為則按小承氣湯證而腹滿甚厚朴七物湯厚朴半斤甘草三兩大黃三兩大棗十枚枳實五枚桂枝二兩生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤病腹滿發熱十日脈浮而數飲食如故為則按此方合厚朴三物桂枝湯去芍藥湯而加生薑二兩也由是觀之當有二方之證而上逆嘔證大承氣湯大黃四兩厚朴半斤枳實五枚芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微煮一兩沸分溫再服得下余勿服陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便後硬而少也以小承氣湯和之不轉失氣者慎不可攻也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱讝語者大承氣湯主之若一服利止後服陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬泉汗出讝語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之傷寒六七日目中不了了晴不和無表裡證大便難身微熱者此為實急下之陽明發熱汗多者急下之發汗不解腹滿痛者急下之腹滿不減減不足言當下之陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之少陰病得之二三日口燥咽乾者急下之少陰病自利清水色純青心下必痛口乾燥者急下之少陰病六七日腹脹不大便者急下之下利三部脈皆平按之心下硬者急下之下利脈遲而滑者內實也利末欲止當下之人病有宿食何以別之曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之下利不欲食者以有宿食故也當下之下利差後至其年月日復發者以病不盡也當下之下利脈反滑當有所去下之乃愈病腹中滿痛者此為實也當下之脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可以下之痙為病胸滿口噤臥不著席腳攣急必齘齒病解能食七八日更發熱此為胃實産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則讝語至夜即愈宜大承氣湯主之熱在裡結在膀胱也大黃黃連瀉心湯大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服心下痞按之濡其脈關上浮者傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯為則按當有心悸證瀉心湯大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之心氣不足吐血衄血本以下之故心下痞與瀉心湯痞不解其人口渴而躁煩小便不利者五苓散主之婦人吐涎沫醫反下之心下即痞當先治其吐涎沫以小青龍湯主之涎沫止乃治痞以瀉心湯主之為則按煎法當從大黃黃連瀉心湯附子瀉心湯之法也又曰不足千金作不定今從之附子瀉心湯於瀉心湯方內加附子一枚上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服心下痞而復惡寒汗出者大黃附子湯大黃三兩附子三枚細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服脅下偏痛發熱其脈緊弦此寒也以溫藥下之大黃甘遂湯大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下婦人少腹滿如敦狀小便微難而不渴生後此為水與血俱結在血室也抵當湯水蛭三十個虻蟲三十個桃仁二十個大黃三兩上四味為末以水五升煮取三升去滓溫服一升不下再服太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血婦人經水不利下抵當熱水蛭二十個虻蟲二十五個桃仁二十個大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥橘皮大黃朴硝湯橘皮一兩大黃二兩朴硝二兩上三味以水一大升煮至小升頓服即消鱠食之在心胸間不化吐復不出速下除之久成症病大黃硝石湯大黃黃蘗硝石各四兩梔子十五枚上四味以水六升煮取三升去滓內硝石更煮取一升頓服黃疸腹滿小便不利而赤自汗出此為表和裡實當下之大黃牡丹皮湯大黃四兩牡丹皮一兩桃仁五十個瓜子半升芒硝三合上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也為則按千金方作牡丹皮三兩瓜子一升芒硝二兩瓜子一升今當十兩大黃甘草湯大黃四兩甘草一兩上二味以水三升煮取一升分溫再服食已即吐者為則按當有急迫證調胃承氣湯大黃四兩甘草二兩芒硝半斤上三味㕮咀以水三升煮取一升去滓內芒硝更上火微者令沸少少溫服傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與謂胃承氣湯若重發汗復加燒針者四逆湯主之發汗後惡寒者虛故也不惡寒便熱者實也當和胃氣太陽病未解陰陽脈俱停必先振栗汗出而解但陽陰微者先汗出而解但陰脈微者下方而解若欲下之傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也陽明病不吐不下心煩者太陽病三日發汗不解蒸蒸發熱者屬胃也傷寒吐後腹脹滿者大便不通胃氣不和者為則按但急迫而大便不通者主之桃核承氣湯桃仁五十個桂枝二兩大黃四兩芒硝二兩甘草二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之下瘀血湯大黃二兩桃仁三十個䗪蟲二十枚上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利土瓜根散土瓜根芍藥桂枝䗪蟲各三分上四味杵為散酒服方寸匕日三服帶下經水不利少腹滿痛經一月再見者陰㿗腫甘草湯甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服少陰病二三日咽痛者可與甘草湯不差者與桔梗湯為則按甘草主急迫者也桔梗湯桔梗一兩甘草一兩上二味以水三升煮取一升去滓分溫再服少陰病二三日咽痛者可與甘草湯不差者與桔梗湯咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰為則按黏痰如膿者主之排膿湯甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服為則按有黏痰或膿血而急迫者主之芍藥甘草湯芍藥四兩甘草四兩上二味㕮咀以水三升煮取一升半去滓分溫再服之傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得方便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與謂胃承氣湯若重發汗復加燒針者四逆湯主之甘遂半夏湯甘遂三枚半夏十二枚芍藥五枚甘草指大一枚上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也為則按芍藥甘草湯加減之方也故當有攣急證芍藥甘草附子湯芍藥三兩甘草三兩附子一枚已上三味以水五升煮取一升五合去滓分溫服發汗病不解反惡寒者虛故也為則按芍藥甘草湯證而惡寒者主之甘麥大棗湯甘草三兩小麥一分大棗十枚上三味以水六升煮取三升分溫三服婦人藏躁喜悲傷欲哭象如神靈所作數缺伸為則按急迫而狂驚者主之甘草粉蜜湯甘草二兩粉一兩蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升差即止蛔蟲之為病令人吐涎心痛發作有時毒藥不止生薑甘草湯生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮取三升分溫三服肺痿咳唾涎沫不止咽燥而渴為則按當有心下痞硬強急證甘草乾薑湯甘草四兩乾薑二兩上㕮咀以水三升煮取一升五合去滓分溫再服肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴傷寒脈浮自汗出小便數心煩微惡寒腳變急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之為則按當有急迫證四逆湯甘草二兩乾薑一兩半附子一枚上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與謂胃承氣湯若重發汗復加燒針者四逆湯主之傷寒醫下之績得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯病發熱頭痛脈反沉若不差身體疼痛當救其里脈浮而遲表熱裡寒下利清穀者自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩少陰病脈沉者急溫之少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之大汗也熱不去內拘急四肢厥又下利厥逆而惡寒者大汗若大下利而厥冷者下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯嘔而脈弱小便復利身有微熱見厥者難治吐利汗出發熱惡寒四肢拘急手足厥冷者既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者為則按此甘草君藥也通脈四逆湯甘草二兩附子一枚乾薑二兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈後加減法面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者下利清穀裡寒外熱汗出而厥者為則按當作附子大者一枚以乾薑知其然甘草新校正作三兩是也四逆加人參湯於四逆湯方內加人參一兩惡寒脈微而復利利止亡血也為則按當有心下輕病也辨之藥徵人參條下茯苓四逆湯茯苓六兩人參一兩甘草二兩乾薑一兩半附子一枚上五味以水五升煮取三升去滓溫服七合日三服發汗若下之病仍不解煩躁者為則按當有心下悸惡寒證通脈四逆加豬膽汁湯於四逆湯方內加豬膽汁半合如無豬膽以羊膽代之吐已下斷汗出而厥四肢拘急不解脈微欲絶者乾薑附子湯乾薑一兩附子一枚上二味以水三升煮取一升去滓頓服下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者附子粳米湯附子一枚半夏半升甘草一兩大棗十枚粳米半升上五味以水八升煮米熟湯成去滓溫服一升日三服腹中寒氣雷鳴切痛胸脅逆滿嘔吐薏苡附子散薏苡仁十五兩大附子十枚上二味杵為散服方寸匕日三服胸痹緩急者為則按當有惡寒或浮腫證薏苡附子敗漿散薏苡仁十分附子二分敗漿五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿白通湯蔥白四莖乾薑一兩附子一枚上三味以水三升煮取一升去滓分溫再服少陰病下利為則按當有氣逆證白通加豬膽汁湯蔥白四莖乾薑一兩附子一枚人尿五合豬膽汁一合已上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生大烏頭煎烏頭大者五枚上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人五合不差明日更服不可一日再服腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則自汗出手足厥冷其脈沉弦者烏頭湯麻黃芍藥黃蓍各三兩甘草三兩川烏五枚㕮咀以蜜二升煎取一升即出烏頭上五味㕮咀四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之病歷節不可屈伸疼痛腳氣疼痛不可屈伸寒疝腹中絞痛痛風入攻五臟拘急不得轉側發作有時使人陰縮手足厥逆為則按當有自汗盜汗浮腫證赤丸茯苓四兩半夏四兩方用桂烏頭二兩細辛一兩上四味末之內真朱為色煉蜜丸如麻子大先食酒飲下三丸日再夜一服不知稍增之以知為度寒氣厥逆為則按當有心下悸及嘔而腹痛證真武湯茯苓三兩芍藥三兩生薑三兩術二兩附子一枚上五味以水八升煮取三升去滓溫服七合日三服後加減法若咳者加五味半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者附子湯附子二枚茯苓三兩人參二兩術四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服少陰病得之一二日口中和其背惡寒者當灸之少陰病身體痛手足寒骨節痛脈沉者為則按當有小便不利心下悸或痞硬證藥微辨之天雄散天雄三兩當作三枚術八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之為則按失精家而小便不利臍下有動或惡寒或沖逆者主之藥徵辨之梔子豉湯梔子十四枚香豉四合上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹發汗若下之而煩熱胸中窒者傷寒五六日大下之後身熱不去心中結痛者未欲解也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者下利後更煩按之心下濡者為虛煩也為則按集注曰舊本有一服得吐止後服七字此因瓜蒂散中有香豉而誤傳於此今為刪正余亦從之以下效之梔子甘草豉湯梔子豉湯方內加入甘草二兩梔子豉湯證而若少氣者梔子生薑豉湯梔子豉湯方內加生薑五兩梔子豉湯證而若嘔者為則曰以上二方證以若字者冠梔子豉湯證之辭今裂而列之故敢加梔子豉湯證而六字以通其意也枳實梔子豉湯枳實三枚梔子十四枚豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓分溫再服覆令微似汗大病差後勞復者枳實梔子湯主之若有宿食者加大黃如棋子大五六枚為則按當有心中懊憹胸滿證梔子大黃豉湯梔子十二枚大黃一兩枳實五枚豉一升上四味以水六升煮取二升分溫三服酒黃疸心中懊憹或熱痛茵陳蒿湯茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃傷寒七八日身黃如橘子色小便不利腹微滿者梔子蘗皮湯梔子十五個甘草一兩黃蘗二兩上三味以水四升煮取一升半去滓分溫再服傷寒身黃髮熱者梔子厚朴湯梔子十四枚厚朴四兩枳實四枚已上三味以水三升半煮取一升半去滓分三服溫進一服得吐者止後服傷寒下後心煩腹滿臥起不安者梔子乾薑湯梔子十四枚乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者大陷胸湯大黃六兩芒硝一升甘遂一錢上三味以水六升先煮大黃取二升去滓內芒硝煮一二沸內甘遂末溫服一升得快利止後服太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者太陽病重發汗而復下之不大便五六日舌上躁而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯大陷胸丸大黃半斤葶藶半升芒硝半升杏仁半升上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸者項亦強如柔痙狀下之則和小陷胸湯黃連一兩半夏半升栝蔞實大者一個上三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服小結胸病正在心下按之則痛脈浮滑者病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯自散亦可服栝蔞薤白白酒湯栝蔞實一枚薤白半升白酒七升上三味同煮取二升分溫再服胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白半夏湯栝蔞實一枚薤白三兩半夏半升白酒一斗上四味同煮取四升溫服一升日三服胸痹不得臥心痛徹背者為則按當有嘔或胸腹鳴證瓜蒂散瓜蒂一分赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸人血虛家不可與瓜蒂散病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宿食在上脘當吐之為則按當有欲吐證文蛤散文蛤五兩上一味為散以沸湯和一錢匕服湯用五合病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服渴欲飲水不止者大半夏湯半夏二升人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮取二升半溫服一升余分再服胃反嘔吐者為則按外臺云治嘔心下痞硬者今從之小半夏湯半夏一升生薑半斤上二味以水七升煮取一升半分溫再服嘔家本渴者為欲解今反不渴心下有支飲故也黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者諸嘔吐谷不得下者生薑半夏湯半夏半升生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一嘔止停後服病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈小半夏加茯苓湯半夏一升生薑半斤茯苓三兩上三味以水七升煮取一升五合分溫再服卒嘔吐心下痞膈間有水眩悸者先渴後嘔為水停心下此屬飲家半夏苦酒湯半夏十四枚雞子一枚上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三