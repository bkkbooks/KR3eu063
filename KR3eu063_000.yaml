front:
  text: 序欽繇嘗患血症五六年矣骨將枯矣東洞翁肉焉爾後相得而歡篤欽繇於醫事混然途之人也比比耳目其術奏效間聞為其徒辨惑之略曰唐宋來方技家無慮數十丹溪東垣輩稱其時其論著鑿空張虛如其持之有故其言之成理而無益於術投飢餓以土羹乎救決河用枯蘀乎而近世醫或一毒同症而投其劑朝更夕改其莽之設令乎或一毒異症仍貫乎其施其守株刻船乎而或其中非爾力也病者天幸已非然則諺云驅飯上蠅耳豈視越人所論仲景所傳以為周之冕不可冠殷之輅不可乘矣奚不能自開一眼以蹈冥故途甚矣世醫之墨墨也乃使秦張二子謂千歲無知己此胡異乎見表石為鬼兕藏燕石為大寶雖素非芒軔僈楛者面牆使然乎即有一說憚驚人耳換面陳言而丹溪東垣輩之尸之祝及或見讀古方書者又儢儢然猥以徒蔽精神奚乃為此方枘圓鑿安所施之且利之昧心也使志不立彼何論於救濟張氏所謂寧不利於病不拂富家心其簧巧求售如假飾妖娣倚閭求歡者不自知其陋又不恥其恥焉則又何進焉噫即使為則沙汰其砂礫簸揚其秕糠乃不能以一旦遽洗浣世醫舊染夏蟲疑冰不亦類乎亦唯候後世之公言耳蓋詭隨儇子聞此語豈不謂避灶猶煬沾沾背出汗乎詩云我思古人俾無訖兮東洞翁之謂也蓋東洞翁壯年前憤厲激發立志其復古焦心覃思更唐宋失機縱敵之弱謀張秦張應變摧堅之紀律乃遂揭旗幟其道振金鼓其黨亦惟繼絶存亡矣斯亦謂與秦張二氏千歲而比肩也不亦宜乎往年醫斷出則若夫金科玉條乎腐論迂說者瞲然疑之愕然駭之胸胸彈之訑訑拒之或自覺昨非以思改轍而以日莫途遠倒行逆施或暗然自掩寄託遺簪弊履乃巧其遁辭鬻其苦窳者或托神奇其道假儒飾其業乃謂攻異端斯害已者亦有之如思折伯牙之指願摧王良之手者亦有之余聞之人言稍黠者陽排斥東洞譙訶其說陰謄抄其著稿用以為帳祕而緣飾其術往往取其效者亦有之亦惟繫縛於名漠湣於利也雖然醫斷已出牖後進杖心盲乃染指於古或千里負芨委然就學或聞風而弗然興者不為不多矣古人云涉淺水者見蝦其頗深者察魚鱉其尤者觀蛟龍焉知世不有深入於刀圭之道者乎則知東洞者何候後世乎其著藉追踵出則又焉知不有初睥睨者心竊若小巫於翁而神氣竭耶間者刊其類聚方是亦不啻設左右廣而導之前茅也一日謂余曰世謀其著之顯而請其序也或以貴或以名假其熏輝余也不然幸以子之識為則也題一言夫名之剖發於海內此藉自白矣且欽繇不知醫事者也何為重於此舉但書諄誨其徒之緒餘以為序是已已而豈足盡東洞翁乎豈足盡東洞翁乎寶曆癸未之春美濃武欽繇撰自序醫之學也方焉耳炎黃氏邈矣靡得而聞已周室之盛以療萬民之病則有醫職之設其既有醫職之設其法豈可不精焉惜夫官失其職籍滅其傳迷方之士奚所得其門而入之而睹藥劑之富法術之妙乎後有曰扁鵲者謂秦越人也名著天下余初讀其傳少覺疾醫之法竊以為己師然而扁鵲之沒也籍亦不傳吾雖有祈嚮者其奈之何當漢之時張氏之為方也雖復稍後扁鵲而其藥劑之富法術之存蓋莫古焉而醫之學也方焉耳吾亦何求疾醫之法其可以復耶曰何不可也吾常恨其世之與時移籍非其舊將稽之諸家以復之於古仲景氏吾如爾何自漢已降以人以籍孰可以憲章者吾其舍此亦何依遂以扁鵲為法臨張氏之籍久之而後知扁鵲之與張氏醫法一也乃今而後味之淄澠可以辨見之毫釐可以晰而後若置其身於千載之上親受其指揮也蓋夫張氏之籍之難讀也方之與證之散在諸篇使夫學者惑焉今也列而類之附以己所見其有疑者矩之以方焉名曰類聚方庶幾使夫學者雖非易牙淄澠可以味矣雖非離婁毫釐可以見矣遂命剞劂之師遺之篤信好古之士云爾寶曆壬午夏六月阿岐吉益為則撰
